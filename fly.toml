# fly.toml — MapTap Fly.io configuration
app = "maptap"
primary_region = "iad"  # US East — change to nearest: lhr=London, cdg=Paris, nrt=Tokyo, etc.

[build]

[http_service]
  internal_port = 3001
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
